kind = "web"
previewPath = "/test/"
title = "Careibu Test"
version = "1.0.0"
id = "artifacts/test"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/test/" ]
localPort = 22751

[services.development]
run = "pnpm --filter @workspace/test run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/test", "run", "build" ]
publicDir = "artifacts/test/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22751"
BASE_PATH = "/test/"
