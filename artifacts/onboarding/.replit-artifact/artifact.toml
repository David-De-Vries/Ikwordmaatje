kind = "web"
previewPath = "/onboarding/"
title = "Careibu Onboarding"
version = "1.0.0"
id = "artifacts/onboarding"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/onboarding/" ]
localPort = 23165

[services.development]
run = "pnpm --filter @workspace/onboarding run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/onboarding", "run", "build" ]
publicDir = "artifacts/onboarding/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23165"
BASE_PATH = "/onboarding/"
